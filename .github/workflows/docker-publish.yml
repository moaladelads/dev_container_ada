name: Docker Publish

on:
  push:
    tags:
      - "v*"
      - "gnat-*"
  workflow_dispatch:
    inputs:
      gnat_version:
        description: "GNAT version tag component (Alire image only)"
        required: false
        default: "15.2.1"
      gprbuild_version:
        description: "GPRBuild version tag component (Alire image only)"
        required: false
        default: "25.0.1"
      publish_latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: false

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Publish Alire-managed toolchain image (Dockerfile)
  # --------------------------------------------------------------------------
  publish-alire:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/abitofhelp/dev-container-ada
      GNAT_VERSION: ${{ github.event.inputs.gnat_version || '15.2.1' }}
      GPRBUILD_VERSION: ${{ github.event.inputs.gprbuild_version || '25.0.1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_latest == 'true') }}
            type=raw,value=gnat-${{ env.GNAT_VERSION }}
            type=raw,value=gnat-${{ env.GNAT_VERSION }}-gprbuild-${{ env.GPRBUILD_VERSION }}
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GNAT_VERSION=${{ env.GNAT_VERSION }}
            GPRBUILD_VERSION=${{ env.GPRBUILD_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # --------------------------------------------------------------------------
  # Job 2: Publish system toolchain image (Dockerfile.system)
  # --------------------------------------------------------------------------
  publish-system:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/abitofhelp/dev-container-ada-system

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_latest == 'true') }}
            type=raw,value=system-gnat-13
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.system
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
