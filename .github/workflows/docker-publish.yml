name: Docker Publish

on:
  push:
    tags:
      - "v*"
      - "gnat-*"
  workflow_dispatch:
    inputs:
      gnat_version:
        description: "GNAT version tag component"
        required: false
        default: "15.2.1"
      gprbuild_version:
        description: "GPRBuild version tag component"
        required: false
        default: "25.0.1"
      publish_latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: false

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/abitofhelp/dev-container-ada
      GNAT_VERSION: ${{ github.event.inputs.gnat_version || '15.2.1' }}
      GPRBUILD_VERSION: ${{ github.event.inputs.gprbuild_version || '25.0.1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_latest == 'true') }}
            type=raw,value=gnat-${{ env.GNAT_VERSION }}
            type=raw,value=gnat-${{ env.GNAT_VERSION }}-gprbuild-${{ env.GPRBUILD_VERSION }}
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GNAT_VERSION=${{ env.GNAT_VERSION }}
            GPRBUILD_VERSION=${{ env.GPRBUILD_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
