name: Docker Build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "alire"
            dockerfile: "Dockerfile"
            image_name: "dev-container-ada"
            build_args: "--build-arg GNAT_VERSION=15.2.1 --build-arg GPRBUILD_VERSION=25.0.1"
            compile_cmd: "alr exec -- gprbuild -P hello_ada.gpr -j0"
            gnat_cmd: "alr exec -- gnat --version | head -1"
            gprbuild_cmd: "alr exec -- gprbuild --version | head -1"
          - name: "system"
            dockerfile: "Dockerfile.system"
            image_name: "dev-container-ada-system"
            build_args: ""
            compile_cmd: "gprbuild -P hello_ada.gpr -j0"
            gnat_cmd: "gnat --version | head -1"
            gprbuild_cmd: "gprbuild --version | head -1"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build container image (${{ matrix.name }})
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.build_args }} \
            -t ${{ matrix.image_name }}:ci .

      - name: Smoke test
        run: |
          docker run --rm \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -e HOST_USER=$(whoami) \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace/examples/hello_ada \
            ${{ matrix.image_name }}:ci \
            bash -c '
              set -e
              echo "=== Environment ==="
              echo "USER=$(whoami) UID=$(id -u) GID=$(id -g) HOME=$HOME"
              echo "DISPLAY_USER=$DISPLAY_USER"
              echo "CONTAINER_RUNTIME=$CONTAINER_RUNTIME"
              echo ""
              echo "=== Compile test ==="
              ${{ matrix.compile_cmd }}
              echo ""
              echo "=== Run test ==="
              bin/hello_ada
              echo ""
              echo "=== Toolchain versions ==="
              ${{ matrix.gnat_cmd }}
              ${{ matrix.gprbuild_cmd }}
              alr --version | head -1
              echo "=== Smoke test passed ==="
            '
